<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16283f"/>
      <stop offset="55%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#274b78"/>
    </linearGradient>
    <radialGradient id="glow5" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg5)"/>

  <g stroke="#c9a961" stroke-opacity="0.14" fill="none" stroke-width="1.5">
    <circle cx="600" cy="315" r="270"/>
    <circle cx="600" cy="315" r="230"/>
  </g>
  <g fill="#c9a961" fill-opacity="0.16">
    <circle cx="120" cy="90" r="3"/>
    <circle cx="150" cy="120" r="3"/>
    <circle cx="180" cy="90" r="3"/>
    <circle cx="1080" cy="540" r="3"/>
    <circle cx="1050" cy="510" r="3"/>
    <circle cx="1020" cy="540" r="3"/>
  </g>

  <rect x="0" y="0" width="1200" height="630" fill="url(#glow5)"/>

  <g transform="translate(64,56)">
    <rect x="0" y="0" width="9" height="26" fill="#c9a961"/>
    <text x="22" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="17" letter-spacing="3" fill="#e7d9b8">HUKUK REHBERİ</text>
  </g>

  <!-- Ana motif: adalet terazisi (emsal karar / içtihat teması) -->
  <g transform="translate(600,300)">
    <!-- direk -->
    <rect x="-6" y="-150" width="12" height="230" rx="4" fill="#e9dcb9"/>
    <!-- taban -->
    <path d="M -70,80 L 70,80 L 50,102 L -50,102 Z" fill="#e9dcb9"/>
    <rect x="-90" y="100" width="180" height="14" rx="6" fill="#e9dcb9"/>
    <!-- üst tepe süsü -->
    <circle cx="0" cy="-162" r="14" fill="#c9a961"/>
    <!-- kol -->
    <line x1="-190" y1="-118" x2="190" y2="-118" stroke="#e9dcb9" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="-118" r="9" fill="#c9a961"/>

    <!-- sol kefe -->
    <g stroke="#c9a961" stroke-width="3" fill="none" stroke-opacity="0.85">
      <line x1="-190" y1="-118" x2="-230" y2="-40"/>
      <line x1="-190" y1="-118" x2="-150" y2="-40"/>
    </g>
    <path d="M -238,-40 Q -190,10 -142,-40 Z" fill="#0f2136" fill-opacity="0.4" stroke="#e9dcb9" stroke-width="5" stroke-linejoin="round"/>

    <!-- sağ kefe -->
    <g stroke="#c9a961" stroke-width="3" fill="none" stroke-opacity="0.85">
      <line x1="190" y1="-118" x2="150" y2="-40"/>
      <line x1="190" y1="-118" x2="230" y2="-40"/>
    </g>
    <path d="M 142,-40 Q 190,10 238,-40 Z" fill="#0f2136" fill-opacity="0.4" stroke="#e9dcb9" stroke-width="5" stroke-linejoin="round"/>

    <!-- arkada belge silueti -->
    <g transform="translate(0,20) rotate(-6)" opacity="0.5">
      <rect x="-58" y="-10" width="116" height="150" rx="8" fill="none" stroke="#e9dcb9" stroke-width="3"/>
      <line x1="-38" y1="20" x2="38" y2="20" stroke="#e9dcb9" stroke-width="3"/>
      <line x1="-38" y1="42" x2="38" y2="42" stroke="#e9dcb9" stroke-width="3"/>
      <line x1="-38" y1="64" x2="18" y2="64" stroke="#e9dcb9" stroke-width="3"/>
    </g>
  </g>

  <g transform="translate(1136,566)" text-anchor="end">
    <text font-family="Georgia, serif" font-size="18" fill="#c9a961" font-style="italic">Hukuk Emsal</text>
  </g>
</svg>
