<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16283f"/>
      <stop offset="55%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#274b78"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg3)"/>

  <g stroke="#c9a961" stroke-opacity="0.14" fill="none" stroke-width="1.5">
    <circle cx="600" cy="315" r="270"/>
    <circle cx="600" cy="315" r="230"/>
  </g>
  <g fill="#c9a961" fill-opacity="0.16">
    <circle cx="120" cy="90" r="3"/>
    <circle cx="150" cy="120" r="3"/>
    <circle cx="180" cy="90" r="3"/>
    <circle cx="1080" cy="540" r="3"/>
    <circle cx="1050" cy="510" r="3"/>
    <circle cx="1020" cy="540" r="3"/>
  </g>

  <rect x="0" y="0" width="1200" height="630" fill="url(#glow3)"/>

  <g transform="translate(64,56)">
    <rect x="0" y="0" width="9" height="26" fill="#c9a961"/>
    <text x="22" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="17" letter-spacing="3" fill="#e7d9b8">İCRA &amp; TAHSİLAT HUKUKU</text>
  </g>

  <!-- Ana motif: kalkan + kilit (güvence altına alma teması) -->
  <g transform="translate(600,320)">
    <path d="M 0,-190 L 150,-140 L 150,10 C 150,110 80,175 0,205 C -80,175 -150,110 -150,10 L -150,-140 Z"
          fill="#0f2136" fill-opacity="0.4" stroke="#e9dcb9" stroke-width="6" stroke-linejoin="round"/>

    <!-- kilit gövdesi -->
    <rect x="-52" y="-10" width="104" height="86" rx="14" fill="#e9dcb9"/>
    <path d="M -30,-10 L -30,-46 C -30,-78 30,-78 30,-46 L 30,-10"
          fill="none" stroke="#e9dcb9" stroke-width="14" stroke-linecap="round"/>
    <circle cx="0" cy="26" r="11" fill="#1e3a5f"/>
    <rect x="-6" y="30" width="12" height="24" rx="4" fill="#1e3a5f"/>

    <!-- zincir halkaları -->
    <g fill="none" stroke="#c9a961" stroke-width="6" stroke-opacity="0.8">
      <ellipse cx="-190" cy="-30" rx="22" ry="16" transform="rotate(20 -190 -30)"/>
      <ellipse cx="-160" cy="10" rx="22" ry="16" transform="rotate(-15 -160 10)"/>
      <ellipse cx="190" cy="-30" rx="22" ry="16" transform="rotate(-20 190 -30)"/>
      <ellipse cx="160" cy="10" rx="22" ry="16" transform="rotate(15 160 10)"/>
    </g>
  </g>

  <!-- teminat oranı vurgusu -->
  <g transform="translate(600,560)" text-anchor="middle" font-family="Georgia, serif">
    <text font-size="17" letter-spacing="2" fill="#c9a961">TEMİNAT ~%15</text>
  </g>

  <g transform="translate(1136,566)" text-anchor="end">
    <text font-family="Georgia, serif" font-size="18" fill="#c9a961" font-style="italic">Hukuk Emsal</text>
  </g>
</svg>
