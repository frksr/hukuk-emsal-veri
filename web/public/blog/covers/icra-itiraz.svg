<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16283f"/>
      <stop offset="55%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#274b78"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="46%" r="42%">
      <stop offset="0%" stop-color="#c9a961" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#c9a961" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg1)"/>

  <!-- ince dekoratif dairesel çizgiler -->
  <g stroke="#c9a961" stroke-opacity="0.14" fill="none" stroke-width="1.5">
    <circle cx="600" cy="315" r="270"/>
    <circle cx="600" cy="315" r="230"/>
  </g>
  <g fill="#c9a961" fill-opacity="0.16">
    <circle cx="120" cy="90" r="3"/>
    <circle cx="150" cy="120" r="3"/>
    <circle cx="180" cy="90" r="3"/>
    <circle cx="1080" cy="540" r="3"/>
    <circle cx="1050" cy="510" r="3"/>
    <circle cx="1020" cy="540" r="3"/>
  </g>

  <rect x="0" y="0" width="1200" height="630" fill="url(#glow1)"/>

  <!-- kurumsal köşe etiketi -->
  <g transform="translate(64,56)">
    <rect x="0" y="0" width="9" height="26" fill="#c9a961"/>
    <text x="22" y="19" font-family="Georgia, 'Times New Roman', serif" font-size="17" letter-spacing="3" fill="#e7d9b8">İCRA &amp; TAHSİLAT HUKUKU</text>
  </g>

  <!-- Ana motif: kronometre + tokmak (itiraz süresi teması) -->
  <g transform="translate(600,330)">
    <!-- saat gövdesi -->
    <circle r="150" fill="none" stroke="#e9dcb9" stroke-width="6"/>
    <circle r="150" fill="#0f2136" fill-opacity="0.35"/>
    <!-- kronometre düğmesi -->
    <rect x="-20" y="-190" width="40" height="26" rx="8" fill="#e9dcb9"/>
    <line x1="-46" y1="-176" x2="-30" y2="-192" stroke="#e9dcb9" stroke-width="10" stroke-linecap="round"/>
    <line x1="46" y1="-176" x2="30" y2="-192" stroke="#e9dcb9" stroke-width="10" stroke-linecap="round"/>

    <!-- kadran çizgileri -->
    <g stroke="#e9dcb9" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-132" x2="0" y2="-114"/>
      <line x1="132" y1="0" x2="114" y2="0"/>
      <line x1="0" y1="132" x2="0" y2="114"/>
      <line x1="-132" y1="0" x2="-114" y2="0"/>
      <line x1="93" y1="-93" x2="80" y2="-80" stroke-width="3"/>
      <line x1="93" y1="93" x2="80" y2="80" stroke-width="3"/>
      <line x1="-93" y1="93" x2="-80" y2="80" stroke-width="3"/>
      <line x1="-93" y1="-93" x2="-80" y2="-80" stroke-width="3"/>
    </g>

    <!-- akrep/yelkovan: 7'yi işaret eder (7 günlük itiraz süresi) -->
    <line x1="0" y1="0" x2="-70" y2="98" stroke="#c9a961" stroke-width="9" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="55" y2="-95" stroke="#f4ead0" stroke-width="7" stroke-linecap="round"/>
    <circle r="10" fill="#c9a961"/>

    <!-- tokmak (gavel) siluet, sağ altta çapraz -->
    <g transform="translate(150,150) rotate(-35)">
      <rect x="-14" y="-70" width="28" height="70" rx="6" fill="#e9dcb9" fill-opacity="0.9"/>
      <rect x="-46" y="-96" width="92" height="34" rx="8" fill="#e9dcb9"/>
    </g>
  </g>

  <!-- alt marka -->
  <g transform="translate(1136,566)" text-anchor="end">
    <text font-family="Georgia, serif" font-size="18" fill="#c9a961" font-style="italic">Hukuk Emsal</text>
  </g>
</svg>
